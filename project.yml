name: WikiUmeQuiz
options:
  bundleIdPrefix: com.baiteen
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  WikiUmeQuiz:
    type: application
    platform: iOS
    sources:
      - path: WikiUmeQuiz
    settings:
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.baiteen.WikiUmeQuiz
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
  WikiUmeQuizTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WikiUmeQuizTests
    dependencies:
      - target: WikiUmeQuiz
    settings:
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
